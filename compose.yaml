services:
  llm:
    container_name: llm
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

volumes:
  ollama_storage:
  qdrant_storage:
